<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f2c2f">
  <meta name="description" content="Editar ingressos de eventos">
  <title>Editar Ingressos</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icon-32.png">
  <link rel="apple-touch-icon" href="assets/icon-152.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/icon-152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-192.png">
  <link rel="apple-touch-icon" sizes="167x167" href="assets/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Meus Ingressos">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="container">

  <header class="header">
    <a href="index.html" class="back">&lt;</a>
    <h1>Editar Ingressos</h1>
    <div></div>
  </header>

  <!-- EVENTO -->
  <p class="section-title">Evento</p>

  <div class="field">
    <label>NOME DO EVENTO</label>
    <input type="text" id="eventoNome" placeholder="Ex: Harry Styles: Together, Together">
  </div>

  <div class="row">
    <div class="field">
      <label>DATA</label>
      <input type="text" id="eventoData" placeholder="Ex: 18/07/2026">
    </div>
    <div class="field">
      <label>HORÁRIO</label>
      <input type="text" id="eventoHorario" placeholder="Ex: 20:45hs">
    </div>
  </div>

  <div class="field">
    <label>LOCAL</label>
    <input type="text" id="eventoLocal" placeholder="Ex: MorumBis">
  </div>

  <div class="field">
    <label>IMAGEM (THUMB)</label>
    <select id="eventoThumb">
      <option value="assets/acdc.png">acdc.png</option>
      <option value="assets/djavan.png">djavan.png</option>
      <option value="assets/enhy.png">enhy.png</option>
      <option value="assets/harry.png">harry.png</option>
      <option value="assets/jonasb.png">jonasb.png</option>
      <option value="assets/kidabelha.png">kidabelha.png</option>
      <option value="assets/lolaini.png">lolaini.png</option>
      <option value="assets/lollaa.png">lollaa.png</option>
      <option value="assets/rufus.png">rufus.png</option>
      <option value="assets/superliga.png">superliga.png</option>
      <option value="assets/the weenknd.png">the weeknd.png</option>
    </select>
    <img id="thumbPreview" src="" style="margin-top:10px;width:100%;border-radius:10px;display:none;">
  </div>

  <!-- INGRESSOS -->
  <p class="section-title">Ingressos</p>

  <div id="ingressos-list"></div>

  <button class="btn-add" id="btnAdd">+ Adicionar ingresso</button>

  <button class="btn-save" id="btnSave">Salvar</button>
  <button class="btn-preview" id="btnPreview">Pré-visualizar ingresso</button>
  <button class="btn-reset" id="btnReset">Restaurar padrão</button>

</div>

<div class="toast" id="toast">Salvo com sucesso!</div>

<script type="module" src="admin.js"></script>
</body>
</html>
